stages:
  - test
  - build

variables:
  GO_VERSION: "1.26"
  DOCKER_IMAGE: "incindigo-api"

go-test:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - go mod download
    - go test ./...

web-build:
  stage: test
  image: node:22
  before_script:
    - corepack enable
    - corepack prepare pnpm@10 --activate
  script:
    - cd web
    - pnpm install --frozen-lockfile=false
    - pnpm build

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t ${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - docker tag ${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA} ${DOCKER_IMAGE}:latest

deploy:
  stage: build
  image: alpine:3.21
  script:
    - echo "Deploying incindigo-api target"
    - ./deploy/deploy.sh
  only:
    - main
